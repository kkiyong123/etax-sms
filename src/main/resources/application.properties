spring.application.name=etax-sms
server.port=8080
spring.datasource.url=jdbc:postgresql://${DB_HOST:etax-pgcluster-pgbouncer}:${DB_PORT:5432}/${DB_NAME:etaxdb}
spring.datasource.username=${DB_USER:etaxuser}
spring.datasource.password=${DB_PASSWORD:etax@DB2026}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
sms.provider.url=${SMS_PROVIDER_URL:http://sms-gateway:8080}
sms.provider.api-key=${SMS_API_KEY:test-api-key}
sms.sender.id=${SMS_SENDER_ID:IRD-ETAX}
logging.level.lk.gov.ird.etax=INFO
